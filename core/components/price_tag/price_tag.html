<div class="{% if align == 'center' %}text-center{% elif align == 'right' %}text-right{% else %}text-left{% endif %}">
  {% if price %}
    <div class="text-xs text-base-content/60">R$ {{ price|floatformat:2 }}</div>
  {% endif %}
  
  {% if unit_price %}
    <div class="text-2xl font-bold text-primary">
      {{ unit_price|floatformat:2 }}
      <span class="text-sm font-normal text-base-content/60">{{ unit_label }}</span>
    </div>
  {% endif %}
</div>
