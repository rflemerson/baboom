{% load widget_tweaks i18n %}

<div class="drawer-side z-50" x-data>
  <label for="filter-drawer"
         aria-label="{% trans "close sidebar" %}"
         class="drawer-overlay"></label>
  <div class="menu p-0 w-full max-w-md min-h-full bg-base-100 text-base-content flex flex-col">
    <div class="flex items-center justify-between px-4 py-4 border-b border-base-200">
      <h2 class="text-lg font-semibold text-base-content">{% trans "Filters" %}</h2>
      <label for="filter-drawer" class="btn btn-ghost btn-circle btn-sm">
        <i class="fas fa-times h-5 w-5"></i>
      </label>
    </div>
    <div class="flex-1 overflow-y-auto p-4">
      <form id="filter-form"
            hx-get="{% url 'list' %}"
            hx-target="#product-list"
            class="space-y-6">
        <div class="collapse collapse-arrow border-b border-base-200 rounded-none">
          <input type="checkbox" checked />
          <div class="collapse-title text-sm font-medium text-base-content flex items-center gap-2 p-0 min-h-0 py-4">
            <i class="fas fa-search h-5 w-5"></i> {% trans "Search" %}
          </div>
          <div class="collapse-content px-0">{% render_field filter.form.search class="input input-bordered w-full" %}</div>
        </div>
        <div class="collapse collapse-arrow border-b border-base-200 rounded-none">
          <input type="checkbox" checked />
          <div class="collapse-title text-sm font-medium text-base-content flex items-center gap-2 p-0 min-h-0 py-4">
            <i class="fas fa-store h-5 w-5"></i> {% trans "Brand" %}
          </div>
          <div class="collapse-content px-0">{% render_field filter.form.brand class="select select-bordered w-full" %}</div>
        </div>
      </form>
    </div>
    <div class="border-t border-base-200 px-4 py-4 bg-base-200 mt-auto">
      <div class="flex items-center gap-3">
        <a href="{% url 'list' %}" class="btn btn-outline flex-1">
          <i class="fas fa-trash"></i> {% trans "Clear" %}
        </a>
        <button type="submit"
                form="filter-form"
                class="btn btn-primary flex-1 text-white"
                x-on:click="document.getElementById('filter-drawer').checked = false">{% trans "Apply" %}</button>
      </div>
    </div>
  </div>
</div>
