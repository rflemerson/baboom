{% load static i18n %}

<header class="navbar bg-base-100 shadow-sm z-30 relative">
  <div class="container mx-auto px-4">
    <div class="flex-1">
      <a href="{% url 'product_list' %}"
         class="btn btn-ghost text-xl normal-case gap-2">
        <img src="{% static 'images/icon-192.png' %}"
             alt="Baboom"
             class="h-8 w-8 rounded-full"
             height="32"
             width="32">
        Baboom
      </a>
    </div>
    <div class="flex-none gap-2">
      <a href="{% url 'components_playground' %}" class="btn btn-ghost btn-sm">
        <i class="fas fa-flask"></i> Playground
      </a>
      <button class="btn btn-ghost btn-circle">
        <div class="indicator">
          <i class="fas fa-bell text-xl"></i>
          <span class="badge badge-xs badge-primary indicator-item"></span>
        </div>
      </button>
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn btn-ghost btn-circle avatar">
          <div class="w-10 rounded-full bg-primary text-primary-content grid place-items-center">
            <i class="fas fa-user"></i>
          </div>
        </label>
        <ul tabindex="0"
            class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52">
          <li>
            <a>Profile</a>
          </li>
          <li>
            <a>Settings</a>
          </li>
          <li>
            <a>Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
