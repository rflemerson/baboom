{# Quick Filters Bar #}
{% load widget_tweaks %}

<div class="bg-base-100 border-b border-base-200 py-3 mb-6">
  
  <form hx-get="{% url 'product_list' %}" 
        hx-target="#product-list" 
        hx-trigger="change, keyup delay:500ms from:find input"
        class="flex items-center gap-2 px-4 overflow-x-auto">

      <label for="filter-drawer" class="btn btn-primary btn-sm rounded-full text-white gap-2 drawer-button">
        <i class="fas fa-sliders-h"></i>
        <span>Filters</span>
      </label>

      <div class="divider divider-horizontal m-0 h-6"></div>

      <label class="input input-bordered input-sm rounded-full flex items-center gap-2 w-64">
        <i class="fas fa-search text-base-content/50"></i>
        {% render_field filter.form.search class="grow border-none focus:ring-0 p-0" placeholder="Search..." %}
      </label>

      {% render_field filter.form.brand class="select select-bordered select-sm rounded-full max-w-xs" %}

      <a href="{% url 'product_list' %}" 
         class="btn btn-ghost btn-sm rounded-full gap-2 text-base-content/70 ml-auto">
        <i class="fas fa-times"></i>
        <span>Clear</span>
      </a>

  </form>
</div>
