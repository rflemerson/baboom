{% load widget_tweaks i18n %}

<div class="flex items-center gap-2 mb-6 p-1 overflow-x-auto">
  <form hx-get="{% url 'product_list' %}"
        hx-target="#product-list"
        hx-trigger="change, keyup delay:500ms from:find input"
        class="contents">
    <label for="filter-drawer"
           class="btn btn-primary btn-sm rounded-full text-white gap-2 drawer-button">
      <i class="fas fa-sliders-h"></i> {% trans "Filters" %}
    </label>
    <div class="divider divider-horizontal mx-2 h-6"></div>
    <label class="input input-sm input-bordered flex items-center gap-2 rounded-full w-48 shrink-0">
      <i class="fas fa-search opacity-50"></i>
      {% trans "Search..." as search_placeholder %}
      {% render_field filter.form.search class="grow border-none focus:ring-0 p-0" placeholder=search_placeholder %}
    </label>
    {% render_field filter.form.brand class="select select-bordered select-sm rounded-full w-40 shrink-0" %}
    {% render_field filter.form.ordering class="select select-bordered select-sm rounded-full w-40 shrink-0" %}
    <a href="{% url 'product_list' %}"
       class="btn btn-ghost btn-sm rounded-full gap-2 opacity-70 ml-auto">
      <i class="fas fa-times"></i> {% trans "Clear" %}
    </a>
  </form>
</div>
