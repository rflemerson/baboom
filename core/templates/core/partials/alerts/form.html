{% load i18n %}

<div id="alert-content" class="modal-box">
  <h3 class="font-bold text-lg">{% trans "Get Price Alerts" %}</h3>
  <p class="py-4 text-base-content/70">
    {% trans "Enter your email to receive notifications when prices drop on your favorite products." %}
  </p>
  <form hx-post="{% url 'subscribe_alerts' %}"
        hx-target="#alert-content"
        hx-swap="outerHTML"
        class="space-y-4"
        novalidate>
    {% csrf_token %}
    <div class="form-control">
      <label class="label">
        <span class="label-text">{% trans "Email" %}</span>
      </label>
      {{ form.email }}
      {% if error %}
        <label class="label">
          <span class="label-text-alt text-error">{{ error }}</span>
        </label>
      {% endif %}
    </div>
    <div class="modal-action">
      <label for="alert-modal" class="btn btn-ghost">{% trans "Cancel" %}</label>
      <button type="submit" class="btn btn-primary">{% trans "Subscribe" %}</button>
    </div>
  </form>
</div>
