{% load i18n %}

<div id="alert-content" class="modal-box text-center">
  <div class="text-success text-6xl mb-4">
    <i class="fas fa-check-circle"></i>
  </div>
  <h3 class="font-bold text-lg">{% trans "You're Subscribed!" %}</h3>
  <p class="py-4 text-base-content/70">
    {% trans "We've added" %} <strong>{{ email }}</strong> {% trans "to our list. You'll be the first to know about price drops!" %}
  </p>
  <div class="modal-action justify-center">
    <label for="alert-modal" class="btn btn-primary">{% trans "Awesome!" %}</label>
  </div>
</div>
