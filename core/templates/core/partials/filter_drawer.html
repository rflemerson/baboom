{# Filter Drawer #}
{% load widget_tweaks %}

<div class="drawer-side z-50">
  
  <label for="filter-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
  
  <div class="menu p-0 w-full max-w-md min-h-full bg-white text-base-content flex flex-col">
    
    <div class="flex items-center justify-between px-4 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-900">Filters</h2>
      <label for="filter-drawer" class="btn btn-ghost btn-circle btn-sm">
        <i class="fas fa-times h-5 w-5"></i>
      </label>
    </div>

    <div class="flex-1 overflow-y-auto p-4">
      <form hx-get="{% url 'product_list' %}" hx-target="#product-list" hx-trigger="change delay:200ms" class="space-y-6">
        
        <div class="collapse collapse-arrow border-b border-gray-100 rounded-none">
          <input type="checkbox" checked /> 
          <div class="collapse-title text-sm font-medium text-gray-900 flex items-center gap-2 p-0 min-h-0 py-4">
            <i class="fas fa-search h-5 w-5"></i> Search
          </div>
          <div class="collapse-content px-0">
             {% render_field filter.form.search class="input input-bordered w-full" %}
          </div>
        </div>

        <div class="collapse collapse-arrow border-b border-gray-100 rounded-none">
          <input type="checkbox" checked /> 
          <div class="collapse-title text-sm font-medium text-gray-900 flex items-center gap-2 p-0 min-h-0 py-4">
            <i class="fas fa-store h-5 w-5"></i> Brand
          </div>
          <div class="collapse-content px-0">
             {% render_field filter.form.brand class="select select-bordered w-full" %}
          </div>
        </div>

      </form>
    </div>

    <div class="border-t border-gray-200 px-4 py-4 bg-gray-50 mt-auto">
      <div class="flex items-center gap-3">
        <a href="{% url 'product_list' %}" class="btn btn-outline flex-1">
          <i class="fas fa-trash"></i> Clear
        </a>
        
        <label for="filter-drawer" class="btn btn-primary flex-1 text-white">
          Apply
        </label>
      </div>
    </div>

  </div>
</div>
