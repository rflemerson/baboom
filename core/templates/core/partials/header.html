{% load static i18n %}

<header class="navbar bg-base-100 shadow-sm mb-6">
  <div class="container mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <a href="{% url 'product_list' %}" class="flex items-center gap-3">
        <img src="{% static 'header.svg' %}"
             alt="Baboom Logo"
             class="h-16 w-auto"
             width="82"
             height="64" />
        <span class="hidden sm:inline text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-[#E37921] to-[#122E41]">BABOOM</span>
      </a>
    </div>
    <div class="flex-none">
      <label for="alert-modal" class="btn btn-ghost btn-sm gap-2">
        <i class="fas fa-bell"></i>
        <span class="hidden sm:inline">{% trans "Price Alerts" %}</span>
      </label>
    </div>
  </div>
</header>
<input type="checkbox" id="alert-modal" class="modal-toggle" />
<div class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <h3 class="font-bold text-lg">{% trans "Get Price Alerts" %}</h3>
    <p class="py-4 text-base-content/70">
      {% trans "Enter your email to receive notifications when prices drop on your favorite products." %}
    </p>
    <form method="post" action="{% url 'subscribe_alerts' %}" class="space-y-4">
      {% csrf_token %}
      <div class="form-control">
        <label class="label">
          <span class="label-text">{% trans "Email" %}</span>
        </label>
        <input type="email"
               name="email"
               placeholder="{% trans "your@email.com" %}"
               class="input input-bordered w-full"
               required />
      </div>
      <div class="modal-action">
        <label for="alert-modal" class="btn btn-ghost">{% trans "Cancel" %}</label>
        <button type="submit" class="btn btn-primary">{% trans "Subscribe" %}</button>
      </div>
    </form>
  </div>
  <label class="modal-backdrop" for="alert-modal">Close</label>
</div>
