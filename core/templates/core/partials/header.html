{% load static i18n %}

<header class="navbar bg-base-100 shadow-sm mb-6">
  <div class="container mx-auto px-4 grid grid-cols-[1fr_auto_1fr] items-center">
    <!-- Left: Monkey Icon -->
    <div class="justify-self-start">
      <a href="{% url 'list' %}" class="block">
        <picture class="hidden sm:block">
          <source srcset="{% static 'images/logo-header-600w.avif' %}"
                  type="image/avif">
          <source srcset="{% static 'images/logo-header-600w.webp' %}"
                  type="image/webp">
          <img src="{% static 'images/logo-header-600w.webp' %}"
               alt="Baboom Logo"
               class="h-auto"
               width="100"
               height="81" />
        </picture>
      </a>
    </div>
    <!-- Center: Logo Name -->
    <div class="justify-self-center">
      <a href="{% url 'list' %}" class="block">
        <img src="{% static 'images/logo-name.svg' %}"
             alt="Baboom"
             class="h-10 w-auto"
             width="137"
             height="40" />
      </a>
    </div>
    <!-- Right: Alerts -->
    <div class="justify-self-end">
      <label for="alert-modal"
             class="btn btn-ghost btn-sm gap-2"
             x-data="{ hover: false }"
             x-on:mouseenter="hover = true"
             x-on:mouseleave="hover = false"
             hx-get="{% url 'subscribe_alerts' %}"
             hx-target="#alert-content"
             hx-swap="outerHTML">
        <i class="fas fa-bomb transition-colors duration-300"
           x-bind:class="hover ? 'fa-shake' : ''"></i>
        <span class="hidden sm:inline">{% trans "Alerts" %}</span>
      </label>
    </div>
  </div>
</header>
<input type="checkbox" id="alert-modal" class="modal-toggle" />
<div class="modal modal-bottom sm:modal-middle">
  <div class="modal-box p-0 bg-transparent shadow-none">
    {% include "core/partials/alerts/form.html" %}

  </div>
  <label class="modal-backdrop" for="alert-modal">Close</label>
</div>
