{% load static i18n %}

<header class="navbar bg-base-100 shadow-sm mb-6">
  <div class="container mx-auto px-4 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <a href="{% url 'product_list' %}" class="flex items-center gap-3">
        <picture>
          <source srcset="{% static 'images/logo-header-600w.avif' %}"
                  type="image/avif">
          <source srcset="{% static 'images/logo-header-600w.webp' %}"
                  type="image/webp">
          <img src="{% static 'images/logo-header-600w.webp' %}"
               alt="Baboom Logo"
               class="h-16 w-auto"
               width="82"
               height="64" />
        </picture>
        <span class="hidden sm:inline text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-[#E37921] to-[#122E41]">BABOOM</span>
      </a>
    </div>
    <div class="flex-none">
      <label for="alert-modal"
             class="btn btn-ghost btn-sm gap-2"
             hx-get="{% url 'subscribe_alerts' %}"
             hx-target="#alert-content"
             hx-swap="outerHTML">
        <i class="fas fa-bell"></i>
        <span class="hidden sm:inline">{% trans "Price Alerts" %}</span>
      </label>
    </div>
  </div>
</header>
<input type="checkbox" id="alert-modal" class="modal-toggle" />
<div class="modal modal-bottom sm:modal-middle">
  <div class="modal-box p-0 bg-transparent shadow-none">
    {% include "core/partials/alerts/form.html" %}

  </div>
  <label class="modal-backdrop" for="alert-modal">Close</label>
</div>
