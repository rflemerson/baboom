<!DOCTYPE html>
{% load django_htmx i18n %}

<html lang="{{ LANGUAGE_CODE }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baboom</title>
    {% load static %}

    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}">
    <link rel="icon"
          type="image/png"
          sizes="192x192"
          href="{% static 'images/icon-192.png' %}">
    <link rel="apple-touch-icon"
          href="{% static 'images/apple-touch-icon.png' %}">
    <link href="{% static 'css/output.css' %}" rel="stylesheet" type="text/css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/2.0.7/htmx.min.js"
            integrity="sha512-IisGoumHahmfNIhP4wUV3OhgQZaaDBuD6IG4XlyjT77IUkwreZL3T3afO4xXuDanSalZ57Un+UlAbarQjNZCTQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>
    {% htmx_script %}
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
  </head>
  <body class="bg-base-200 min-h-screen flex flex-col"
        hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
    {% if messages %}
      <div class="toast toast-top toast-end z-[100]">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} shadow-lg"
               x-data="{ show: true }"
               x-show="show"
               x-transition.duration.500ms
               x-init="setTimeout(() => show = false, 5000)">
            <span>{{ message }}</span>
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% include "core/partials/header.html" %}

    <div class="container mx-auto px-4 flex-1 flex flex-col">
      {% block content %}
      {% endblock content %}
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.15.0/cdn.js"
            integrity="sha512-nHfCQtLDRfNgzsuMx2O2Joo3+xM8antMOBxo9GodZry1h33+lWa2Dd3a/lkVY4fHJK1CAkFcUrz2jilsaZFWeQ=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
            defer></script>
  </body>
</html>
