<div class="flex flex-col sm:flex-row p-4 border-b border-gray-200">
  <div class="flex flex-1 flex-col sm:flex-row justify-between items-center gap-4">
    <div class="flex-1">
      <span class="text-sm text-gray-500">{{ protein.name }}</span>
      <h3 class="text-xl font-semibold">{{ protein.brand }}</h3>

      <!-- Tipos de proteína -->
      <div class="flex flex-wrap gap-2 mt-2">
        <p-tag *ngFor="let type of protein.types" [value]="type" [styleClass]="'text-sm ' + getTypeClasses(type)"
          [rounded]="true">
        </p-tag>
      </div>

      <!-- Demais informações -->
      <div class="mt-3 flex flex-wrap gap-2">
        <!-- Origem -->
        <p-tag [value]="protein.origin" [styleClass]="'text-sm ' + getOriginClasses(protein.origin)" [rounded]="true">
        </p-tag>

        <p-tag [value]="protein.weight + ' g'" styleClass="text-sm bg-blue-100 text-blue-800" [rounded]="true">
        </p-tag>

        <p-tag [value]="protein.packaging === 'pote' ? 'Pote' : 'Refil'"
          styleClass="text-sm bg-green-100 text-green-800" [rounded]="true">
        </p-tag>

        <p-tag [value]="protein.proteinConcentration + '%'" styleClass="text-sm bg-amber-100 text-amber-800"
          [rounded]="true">
        </p-tag>

        <!-- Tipo de processamento -->
        <p-tag *ngIf="protein.processingType && protein.types.includes('Whey')" [value]="protein.processingType"
          styleClass="text-sm bg-indigo-100 text-indigo-800" [rounded]="true">
        </p-tag>
      </div>
    </div>

    <!-- Preço e botão -->
    <div
      class="flex flex-col md:items-center gap-3 min-w-[180px] border border-surface-200 dark:border-surface-700 rounded-lg p-4">

      <div class="text-center space-y-1">
        <!-- Preço total -->
        <div class="text-sm text-gray-500">
          <span class="text-gray-700">R$ {{ protein.price.toFixed(2) }}</span>
          <span class="mx-1">/</span>
          <span>{{ protein.totalProtein }}g</span>
        </div>

        <!-- Preço por grama -->
        <div class="text-2xl font-semibold text-surface-900 dark:text-surface-0">
          {{ (protein.price / protein.totalProtein).toFixed(2) }} R$/g
        </div>
      </div>

      <!-- Botão de compra -->
      <p-button label="Amazon" icon="pi pi-chevron-right" iconPos="right" [fluid]="true" class="w-full" />
    </div>

  </div>
</div>
