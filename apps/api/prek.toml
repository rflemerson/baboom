#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.14.14"
[[repos.hooks]]
id = "ruff"
args = ["--fix"]

[[repos.hooks]]
id = "ruff-format"

[[repos]]
repo = "https://github.com/adamchainz/django-upgrade"
rev = "1.29.1"
[[repos.hooks]]
id = "django-upgrade"
args = ["--target-version", "6.0"]

[[repos]]
repo = "https://github.com/fpgmaas/deptry"
rev = "0.24.0"
[[repos.hooks]]
id = "deptry"
entry = ".venv/bin/python"
args = [
    "-m",
    "deptry",
    ".",
    "--config",
    "pyproject.toml",
    "--optional-dependencies-dev-groups",
    "dev",
    "--package-module-name-map",
    "factory-boy=factory",
    "--per-rule-ignores",
    "DEP002=gunicorn|psycopg|django-celery-results|django-celery-beat,DEP004=factory",
]

[[repos]]
repo = "https://github.com/econchick/interrogate"
rev = "1.7.0"
[[repos.hooks]]
id = "interrogate"
args = ["-vv"]
