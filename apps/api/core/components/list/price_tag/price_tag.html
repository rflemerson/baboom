{% load i18n %}

<div class="text-center">
  {% if price %}
    <div class="text-xs text-base-content/60">R$ {{ price|floatformat:2 }} / {{ total_protein|floatformat:0 }}g</div>
  {% endif %}
  {% if unit_price %}
    <div class="text-2xl font-bold text-primary">
      {{ unit_price|floatformat:2 }}
      <span class="text-sm font-normal text-base-content/60">{{ unit_label }}</span>
    </div>
  {% endif %}
  <a href="{{ external_link }}"
     target="_blank"
     rel="noopener noreferrer"
     class="btn btn-primary btn-sm w-full gap-2 group-hover:btn-accent transition-colors mt-2">
    <i class="fas fa-shopping-cart"></i>
    {% trans "Buy Now" %}
  </a>
</div>
