query CatalogProducts($filters: CatalogProductsFiltersInput) {
  catalogProducts(filters: $filters) {
    pageInfo {
      currentPage
      perPage
      totalPages
      totalCount
      hasPreviousPage
      hasNextPage
    }
    items {
      id
      name
      packagingDisplay
      weight
      lastPrice
      pricePerGram
      concentration
      totalProtein
      externalLink
      brand {
        name
      }
      category {
        name
      }
      tags {
        name
      }
    }
  }
}
