name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull images and restart stack
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H "${{ vars.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
          REGISTRY: ${{ vars.REGISTRY }}
          IMAGE_OWNER: ${{ vars.IMAGE_OWNER }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE }}
          SENTRY_SEND_DEFAULT_PII: ${{ vars.SENTRY_SEND_DEFAULT_PII }}
          SENTRY_MONITOR_CELERY_BEAT: ${{ vars.SENTRY_MONITOR_CELERY_BEAT }}
        run: |
          ssh -i ~/.ssh/production_key "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd /home/ubuntu/app/baboom \
              && git pull --ff-only origin main \
              && DEPLOY_SKIP_GIT_UPDATE=1 \
                REGISTRY=$(printf '%q' "$REGISTRY") \
                IMAGE_OWNER=$(printf '%q' "$IMAGE_OWNER") \
                GHCR_USER=$(printf '%q' "$GHCR_USER") \
                GHCR_TOKEN=$(printf '%q' "$GHCR_TOKEN") \
                SENTRY_DSN=$(printf '%q' "$SENTRY_DSN") \
                SENTRY_TRACES_SAMPLE_RATE=$(printf '%q' "$SENTRY_TRACES_SAMPLE_RATE") \
                SENTRY_SEND_DEFAULT_PII=$(printf '%q' "$SENTRY_SEND_DEFAULT_PII") \
                SENTRY_MONITOR_CELERY_BEAT=$(printf '%q' "$SENTRY_MONITOR_CELERY_BEAT") \
                ./infra/deploy/production.sh"
