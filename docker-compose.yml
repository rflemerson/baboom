services:
  web:
    build: .
    container_name: baboom
    restart: always
    ports:
      - "8000:8000"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  celery:
    build: .
    command: celery -A baboom worker -l info
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PLAYWRIGHT_CDP_URL=http://host.docker.internal:9222
      - DEBUG=1
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,[::1]
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=rpc://
      - DJANGO_SETTINGS_MODULE=baboom.settings
    depends_on:
      rabbitmq:
        condition: service_healthy
