services:
  api:
    image: ${API_IMAGE:-ghcr.io/rflemerson/baboom-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    environment:
      - DJANGO_ENV=${DJANGO_ENV}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      - SENTRY_SEND_DEFAULT_PII=${SENTRY_SEND_DEFAULT_PII:-false}
      - SENTRY_MONITOR_CELERY_BEAT=${SENTRY_MONITOR_CELERY_BEAT:-false}

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-ghcr.io/rflemerson/baboom-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CATALOG_API_URL: ${VITE_CATALOG_API_URL:-/api/catalog/products/}
        VITE_ALERTS_API_URL: ${VITE_ALERTS_API_URL:-/api/alerts/subscribe/}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: baboom_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./infra/nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro,Z
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - api
      - web

  certbot:
    image: certbot/certbot
    container_name: baboom_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  db:
    image: postgres:18
    restart: always
    volumes:
      - ${POSTGRES_DATA_PATH:-/mnt/database/postgres}:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    image: ${API_IMAGE:-ghcr.io/rflemerson/baboom-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    command: sh -c "mkdir -p /app/media && chown -R appuser:appuser /app/media && su appuser -s /bin/sh -c 'celery -A baboom worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-1} --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}'"
    volumes:
      - media_data:/app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DJANGO_ENV=${DJANGO_ENV}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - CELERY_WORKER_CONCURRENCY=${CELERY_WORKER_CONCURRENCY:-1}
      - CELERY_WORKER_PREFETCH_MULTIPLIER=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      - PLAYWRIGHT_CDP_URL=${PLAYWRIGHT_CDP_URL}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      - SENTRY_SEND_DEFAULT_PII=${SENTRY_SEND_DEFAULT_PII:-false}
      - SENTRY_MONITOR_CELERY_BEAT=${SENTRY_MONITOR_CELERY_BEAT:-false}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: ${API_IMAGE:-ghcr.io/rflemerson/baboom-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    command: sh -c "su appuser -s /bin/sh -c 'celery -A baboom beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler'"
    environment:
      - DJANGO_ENV=${DJANGO_ENV}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      - SENTRY_SEND_DEFAULT_PII=${SENTRY_SEND_DEFAULT_PII:-false}
      - SENTRY_MONITOR_CELERY_BEAT=${SENTRY_MONITOR_CELERY_BEAT:-false}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  redis_data:
  media_data:
  static_data:
  certbot_conf:
  certbot_www:
